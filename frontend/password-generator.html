<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Generate secure passwords with customizable options">
  <title>🔑 Password Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="glass-container">
    <h1>🔐 Password Generator</h1>

    <div class="glass-card">
      <label for="length">Password Length</label>
      <input type="number" id="length" min="4" max="20" value="12">
    </div>

    <div class="glass-card">
      <label for="mandatory-string">String to Include (Optional)</label>
      <input type="text" id="mandatory-string" placeholder="e.g., MySecret123">
    </div>

    <div class="glass-card">
      <h3>Password Options</h3>

      <div class="checkbox-group">
        <input type="checkbox" id="uppercase" checked>
        <label for="uppercase">Include Uppercase Letters (A-Z)</label>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="lowercase" checked>
        <label for="lowercase">Include Lowercase Letters (a-z)</label>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="numbers" checked>
        <label for="numbers">Include Numbers (0-9)</label>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="symbols" checked>
        <label for="symbols">Include Symbols (!@#$%)</label>
      </div>
    </div>

    <button id="generate-btn" class="btn-success">🔄 Generate Password</button>

    <div class="glass-card mt-2">
      <h3>🔑 Generated Password</h3>
      <input type="text" id="generated-password" readonly placeholder="Your password will appear here">
      <button id="copy-btn" class="btn-accent">📋 Copy Password</button>
    </div>

    <div class="glass-card">
      <h3>💾 Save to Profile</h3>
      <button id="save-btn" class="btn-warning">✅ Save Password</button>
    </div>
  </div>

  <script src="password-generator.js"></script>
</body>

</html>
