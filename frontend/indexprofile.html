<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Manage your saved passwords securely">
  <title>💾 Password Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <h1>🔐 Your Saved Passwords</h1>

  <div class="glass-container">
    <table>
      <thead>
        <tr>
          <th>🌐 Website</th>
          <th>🔑 Password</th>
        </tr>
      </thead>
      <tbody id="password-table"></tbody>
    </table>

    <button id="add-password-btn" class="btn-success">➕ Add New Password</button>
    <button id="logout-btn" class="btn-warning" style="margin-top: 0.5rem;">🚪 Logout</button>

    <div id="add-password-section" style="display: none;">
      <div class="glass-card mt-2">
        <h3>Add New Password</h3>

        <label for="website">Website</label>
        <input type="text" id="website" placeholder="e.g., google.com" required>

        <label for="length">Password Length</label>
        <input type="number" id="length" min="4" max="20" value="12">

        <h3>Password Options</h3>

        <div class="checkbox-group">
          <input type="checkbox" id="uppercase" checked>
          <label for="uppercase">Uppercase</label>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="lowercase" checked>
          <label for="lowercase">Lowercase</label>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="numbers" checked>
          <label for="numbers">Numbers</label>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="symbols" checked>
          <label for="symbols">Symbols</label>
        </div>

        <label for="mandatory-string">Mandatory String (Optional)</label>
        <input type="text" id="mandatory-string" placeholder="Enter mandatory text">

        <h3>🔑 Generated Password</h3>
        <input type="text" id="password" readonly placeholder="Generate a password">

        <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
          <button id="copy-password-btn" class="btn-small btn-accent">📋 Copy</button>
          <button id="generate-password-btn" class="btn-small btn-success">🔄 Generate</button>
          <button id="save-password-btn" class="btn-small btn-warning">💾 Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="indexprofile.js"></script>
</body>

</html>
