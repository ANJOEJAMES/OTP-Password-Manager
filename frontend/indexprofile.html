<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Manage your saved passwords securely">
  <title>💾 Password Manager</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>
  <div class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>🔐 OTP Manager</h2>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active">
          <span class="icon">📊</span> Dashboard
        </a>
        <div class="nav-divider"></div>
        <button id="logout-btn" class="nav-item logout">
          <span class="icon">🚪</span> Logout
        </button>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Top Header -->
      <header class="top-header">
        <div class="header-search">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-passwords" placeholder="Search passwords...">
        </div>
        <div class="user-profile">
          <span class="user-avatar">👤</span>
          <span id="user-email-display">user@example.com</span>
        </div>
      </header>

      <!-- Stats Overview -->
      <section class="stats-overview">
        <div class="stat-card">
          <div class="stat-icon cyan">🔐</div>
          <div class="stat-info">
            <h3>Total Passwords</h3>
            <p id="total-count">0</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon purple">🛡️</div>
          <div class="stat-info">
            <h3>Security Score</h3>
            <p>Good</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon pink">🔄</div>
          <div class="stat-info">
            <h3>Last Updated</h3>
            <p>Just now</p>
          </div>
        </div>
      </section>

      <!-- Password Table Section -->
      <section class="password-section">
        <div class="section-header">
          <h2>My Vault</h2>
          <button id="add-password-btn" class="btn-success btn-with-icon">
            <span>➕</span> Add Password
          </button>
        </div>

        <div class="glass-container table-container">
          <table>
            <thead>
              <tr>
                <th>Website</th>
                <th>Password</th>
                <th class="text-right">Actions</th>
              </tr>
            </thead>
            <tbody id="password-table"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <!-- Add Password Modal -->
  <div id="add-password-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Add New Password</h3>
        <button id="close-modal-btn" class="close-btn">×</button>
      </div>

      <div class="modal-body">
        <label for="website">Website / App Name</label>
        <input type="text" id="website" placeholder="e.g., google.com or Netflix" required>

        <!-- Password Mode Toggle -->
        <div class="password-mode-toggle">
          <button type="button" class="mode-btn active" data-mode="generate">🔄 Generate Password</button>
          <button type="button" class="mode-btn" data-mode="manual">✏️ Enter Manually</button>
        </div>

        <!-- Manual Password Entry (Hidden by default) -->
        <div id="manual-password-section" class="password-section hidden">
          <label for="manual-password">Your Password</label>
          <div class="input-group">
            <input type="password" id="manual-password" placeholder="Enter your password">
            <button type="button" id="toggle-manual-visibility" class="btn-icon" title="Show/Hide">👁️</button>
          </div>
        </div>

        <!-- Password Generator Section (Visible by default) -->
        <div id="generator-section" class="password-section">
          <label for="length">Password Length</label>
          <div class="range-container">
            <input type="range" id="length-range" min="4" max="20" value="12">
            <input type="number" id="length" min="4" max="20" value="12">
          </div>

          <h4>Password Options</h4>
          <div class="options-grid">
            <div class="checkbox-group">
              <input type="checkbox" id="uppercase" checked>
              <label for="uppercase">Uppercase</label>
            </div>
            <div class="checkbox-group">
              <input type="checkbox" id="lowercase" checked>
              <label for="lowercase">Lowercase</label>
            </div>
            <div class="checkbox-group">
              <input type="checkbox" id="numbers" checked>
              <label for="numbers">Numbers</label>
            </div>
            <div class="checkbox-group">
              <input type="checkbox" id="symbols" checked>
              <label for="symbols">Symbols</label>
            </div>
          </div>

          <label for="mandatory-string">Mandatory String (Optional)</label>
          <input type="text" id="mandatory-string" placeholder="Enter mandatory text">

          <div class="generated-preview">
            <label>Generated Password</label>
            <div class="input-group">
              <input type="text" id="password" readonly placeholder="Click generate">
              <button type="button" id="copy-password-btn" class="btn-icon" title="Copy">📋</button>
              <button type="button" id="generate-password-btn" class="btn-icon" title="Generate">🔄</button>
            </div>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button id="cancel-btn" class="btn-secondary">Cancel</button>
        <button id="save-password-btn" class="btn-primary">Save Password</button>
      </div>
    </div>
  </div>

  <script src="indexprofile.js"></script>
</body>

</html>
