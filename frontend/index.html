<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Secure OTP-based login system with modern design">
  <title>🔐 OTP Login System</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/login.css">
</head>

<body>
  <div class="glass-container">
    <h1>🔐 OTP Login</h1>

    <div id="email-prompt">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="Enter your email" required>
      <button id="send-otp-btn" class="btn-success">✉️ Send OTP</button>
    </div>

    <div id="otp-container" style="display: none;">
      <label for="otp">Enter OTP Code</label>
      <input type="text" id="otp" placeholder="Enter 6-digit OTP" required maxlength="6">
      <button id="verify-otp-btn" class="btn-accent">✅ Verify OTP</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
