<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Access your password profile securely">
  <title>👤 Profile Access</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <h1>💾 Saved Passwords</h1>

  <div class="glass-container">
    <div id="email-prompt">
      <label for="email">Enter Your Email</label>
      <input type="email" id="email" placeholder="your.email@example.com">
      <button id="send-otp-btn" class="btn-success">✉️ Send OTP</button>
    </div>

    <div id="otp-section" style="display: none;">
      <label for="otp">Enter OTP Code</label>
      <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6">
      <button id="verify-otp-btn" class="btn-accent">✅ Verify OTP</button>
    </div>

    <div id="password-table-container" style="display: none;">
      <h3>🔐 Your Saved Passwords</h3>
      <table>
        <thead>
          <tr>
            <th>🌐 Website</th>
            <th>🔑 Password</th>
          </tr>
        </thead>
        <tbody id="password-table"></tbody>
      </table>
    </div>
  </div>

  <script src="profile.js"></script>
</body>

</html>
